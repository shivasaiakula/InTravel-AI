name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  server-syntax:
    name: Server Syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check index.js
          node --check routes.js
          node --check scripts/auth-smoke.js
          node --check scripts/bookings-smoke.js

  server-smoke-bookings:
    name: Server Bookings Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start API and run bookings smoke test
        run: |
          node index.js > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          for i in {1..20}; do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              break
            fi
            sleep 1
          done

          npm run smoke:bookings
