name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger frontend deploy
        env:
          FRONTEND_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$FRONTEND_HOOK" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$FRONTEND_HOOK"

      - name: Trigger backend deploy
        env:
          BACKEND_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$BACKEND_HOOK" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$BACKEND_HOOK"
