services:
  # 🌍 Frontend: Static Site (React/Vite)
  - type: static_site
    name: intravel-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: intravel-backend
          type: web
          property: url

  # ⚙️ Backend: Node.js API
  - type: web
    name: intravel-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromService:
          name: intravel-db
          type: database
          property: host
      - key: DB_USER
        fromService:
          name: intravel-db
          type: database
          property: user
      - key: DB_PASSWORD
        fromService:
          name: intravel-db
          type: database
          property: password
      - key: DB_NAME
        fromService:
          name: intravel-db
          type: database
          property: name
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

databases:
  # 💾 Database: Managed PostgreSQL (Render Free Tier)
  - name: intravel-db
    databaseName: indian_travel_platform
    user: admin
    plan: free
